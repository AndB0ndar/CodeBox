{% extends "base.html" %}
{% block title %}Отправить код{% endblock %}
{% block content %}
<div class="submit-form">
    <h1 class="submit-form__title">Запустить код в изолированном окружении</h1>
    <form action="{{ url_for('site.submit') }}" method="post">
        <div class="submit-form__group">
            <label for="language" class="submit-form__label">Язык:</label>
            <select name="language" id="language" class="submit-form__select">
                <option value="python">Python</option>
                <option value="javascript">JavaScript (Node.js)</option>
                <option value="bash">Bash</option>
            </select>
        </div>

        <div class="submit-form__group">
            <label for="code" class="submit-form__label">Код:</label>
            <textarea name="code" id="code" class="submit-form__textarea" placeholder="Введите код..."></textarea>
        </div>

        <div class="submit-form__group">
            <h3 class="submit-form__label">Ограничения</h3>
            <div class="submit-form__inline-group">
                <div class="submit-form__group">
                    <label for="cpu_limit" class="submit-form__label">CPU (ядра):</label>
                    <input type="number" name="cpu_limit" id="cpu_limit" class="submit-form__input" value="1.0" step="0.1" min="0.1" max="8">
                </div>
                <div class="submit-form__group">
                    <label for="memory_limit" class="submit-form__label">Память:</label>
                    <input type="text" name="memory_limit" id="memory_limit" class="submit-form__input" value="256m" placeholder="например 256m, 1g">
                </div>
                <div class="submit-form__group">
                    <label for="timeout" class="submit-form__label">Таймаут (сек):</label>
                    <input type="number" name="timeout" id="timeout" class="submit-form__input" value="30" min="1" max="300">
                </div>
            </div>
        </div>

        <button type="submit" class="button button--primary">Запустить</button>
    </form>
</div>
{% endblock %}
